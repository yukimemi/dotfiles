# ==============================================================================
# psmux.conf
# ==============================================================================

# --- General Settings ---
setw -g mode-keys vi
set -g buffer-limit 32
set -g default-shell "pwsh"
set -g display-time 10000
set -g focus-events on
set -g history-limit 999999
set -g status-keys vi
set -g status-position bottom

# --- Plugins ---
set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-sensible'
set -g @plugin 'psmux-plugins/psmux-pain-control'
set -g @plugin 'psmux-plugins/psmux-resurrect'
set -g @plugin 'psmux-plugins/psmux-continuum'
set -g @plugin 'psmux-plugins/psmux-prefix-highlight'
set -g @plugin 'psmux-plugins/psmux-logging'

# --- Theme Configuration ---
# set -g @catppuccin-flavor 'mocha'
# set -g @catppuccin-show-powerline 'on'
# set -g @catppuccin-window-style 'rounded'
# set -g @plugin 'psmux-plugins/psmux-theme-catppuccin'

# set -g @tokyonight-style 'night'
# set -g @tokyonight-show-powerline 'off'
# set -g @plugin 'psmux-plugins/psmux-theme-tokyonight'

# set -g @onedark-show-powerline 'off'
# set -g @onedark-separator 'slant'
# set -g @onedark-show-icons 'on'
# set -g @onedark-show-user 'on'
# set -g @plugin 'psmux-plugins/psmux-theme-onedark'

# Choose variant (main/moon/dawn)
set -g @rosepine-variant 'main'

# Enable powerline separators
set -g @rosepine-show-powerline 'off'

# Separator style: arrow, rounded, or slant
set -g @rosepine-separator 'slant'

# Enable Nerd Font icons
set -g @rosepine-show-icons 'on'

# Left section icon: session, window, or rocket
set -g @rosepine-left-icon 'session'

# Show username in status left
set -g @rosepine-show-user 'on'

set -g @plugin 'psmux-plugins/psmux-theme-rosepine'

# --- Custom Keybindings ---
# reload config
unbind r
bind r source-file ~/.psmux.conf \; display-message 'Reloaded ~/.psmux.conf'

# Window management
bind x kill-pane
bind X kill-window
bind i display-panes
bind y copy-mode

# Ctrl + Left/Right for window switching
unbind-key C-Left
bind-key -n C-Left prev
unbind-key C-Right
bind-key -n C-Right next

# --- Familiar Keybindings (Restore Yukimemi's defaults) ---
# Split windows using v and s
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Pane navigation (Directly handled by Neovim and PowerShell)
# We unbind these to ensure they reach the active application
unbind-key -n C-h
unbind-key -n C-j
unbind-key -n C-k
unbind-key -n C-l

# Pane resizing (Prefix + Ctrl + h/j/k/l)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# --- Initialize PPM (MUST BE AT THE BOTTOM) ---
# With psmux 0.4.10, run command with ~ should work more reliably.
run "pwsh -NoProfile -File ~/.psmux/plugins/ppm/ppm.ps1"
