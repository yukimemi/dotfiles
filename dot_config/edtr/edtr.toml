# edtr config. Managed by chezmoi.
# Deploys to ~/.config/edtr/edtr.toml on every platform.
#
# The whole file is pre-rendered through Tera before TOML parsing, so if/elif
# /else/endif blocks can conditionally include entire editor or rule sections.
# Dispatch-time tokens like {{ group }} / {{ file_path }} pass through
# pre-render intact and get rendered per-file by edtr at dispatch time.

[vars]
# Which Neovim front-end to use for main editing.
# "neovide" | "nvim-qt" | "nvim"   (swap this one line to switch)
gui = "nvim-qt"

# ─── Editors ────────────────────────────────────────────────────────────────

# Primary editor, selected by vars.gui above.
{% if vars.gui == "neovide" %}
[editors.gui]
kind = "neovim"
command = "neovide"
# neovide forwards everything after `--` to the embedded nvim, so we use
# args_remote = ["--"] to let --listen reach nvim.
args_remote = ["--"]
listen = '{% if is_windows() %}\\.\pipe\nvim-edtr-{{ group }}{% else %}/tmp/nvim-edtr-{{ group }}.sock{% endif %}'
{% elif vars.gui == "nvim-qt" %}
[editors.gui]
kind = "neovim"
command = "nvim-qt"
args_remote = ["--"]
listen = '{% if is_windows() %}\\.\pipe\nvim-edtr-{{ group }}{% else %}/tmp/nvim-edtr-{{ group }}.sock{% endif %}'
{% else %}
[editors.gui]
kind = "neovim"
command = "nvim"
listen = '{% if is_windows() %}\\.\pipe\nvim-edtr-{{ group }}{% else %}/tmp/nvim-edtr-{{ group }}.sock{% endif %}'
{% endif %}

# Terminal nvim, always available for $EDITOR-callback files (commit messages,
# rebase todos, …). Independent of vars.gui so short blocking edits stay in
# the calling terminal even when the GUI is in use.
[editors.nvim-term]
kind = "neovim"
command = "nvim"
listen = '{% if is_windows() %}\\.\pipe\nvim-edtr-{{ group }}-term{% else %}/tmp/nvim-edtr-{{ group }}-term.sock{% endif %}'

# ─── Rules ──────────────────────────────────────────────────────────────────

# git commit, rebase-todo, merge messages etc. — always terminal nvim, fresh
# instance, block until it exits.
[[rules]]
name = "editor-callback"
match = '(?i)/(COMMIT_EDITMSG|MERGE_MSG|TAG_EDITMSG|EDIT_DESCRIPTION|git-rebase-todo|\.gitmessage|NOTES_EDITMSG|claude-prompt.*|svn-commit\.tmp)$'
editor = "nvim-term"
mode = "new"
sync = true

# Everything else: route to whichever editor vars.gui resolved above.
[[rules]]
name = "default"
match = '.*'
editor = "gui"
group = "default"
mode = "remote"
sync = false
