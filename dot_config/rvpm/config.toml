[[plugins]]
url = "https://github.com/tani/dmacro.nvim"

[[plugins]]
url = "https://github.com/tweekmonster/helpful.vim"

[[plugins]]
url = "https://github.com/itchyny/calendar.vim"
on_cmd = "Calendar"
on_map = [{ lhs = "mc", mode = "n", desc = "Calendar" }]

[[plugins]]
url = "https://github.com/Milly/deno-protocol.vim"

[[plugins]]
url = "https://github.com/juliuswaldmann/here.nvim"

[[plugins]]
url = "https://github.com/Shougo/junkfile.vim"

[[plugins]]
url = "https://github.com/Zeioth/hot-reload.nvim"
depends = ["plenary.nvim"]

[[plugins]]
url = "https://github.com/manuuurino/autoread.nvim"

[[plugins]]
url = "https://github.com/chrishrb/gx.nvim"

[[plugins]]
url = "https://github.com/lambdalisue/vim-file-protocol"

[[plugins]]
url = "https://github.com/mihaifm/MegaToggler"

[[plugins]]
url = "https://github.com/folke/persistence.nvim"

[[plugins]]
url = "https://github.com/chrisgrieser/nvim-early-retirement"

[[plugins]]
url = "https://github.com/glyccogen/imprint.nvim"
on_cmd = "Imprint"

[[plugins]]
url = "https://github.com/xvzc/chezmoi.nvim"
depends = ["plenary.nvim"]

# ── lsp ──────────────────────────────────────────────

[[plugins]]
url = "https://github.com/hrsh7th/nvim-linkedit"

[[plugins]]
url = "https://github.com/stevearc/aerial.nvim"
on_cmd = ["AerialToggle", "AerialPrev", "AerialNext"]
on_map = [{ lhs = "<space>a", mode = "n", desc = "AerialToggle" }]

[[plugins]]
url = "https://github.com/stevearc/conform.nvim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/mfussenegger/nvim-lint"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/williamboman/mason.nvim"
on_cmd = "Mason"
merge = false

[[plugins]]
url = "https://github.com/williamboman/mason-lspconfig.nvim"
lazy = true
merge = false
depends = ["mason.nvim"]

[[plugins]]
url = "https://github.com/folke/lazydev.nvim"
depends = ["nvim-lspconfig"]

[[plugins]]
url = "https://github.com/folke/neoconf.nvim"

[[plugins]]
url = "https://github.com/onsails/lspkind.nvim"

[[plugins]]
url = "https://github.com/mrcjkb/rustaceanvim"
on_ft = ["rust", "toml"]
depends = ["nvim-lspconfig"]

[[plugins]]
url = "https://github.com/alexpasmantier/krust.nvim"
on_ft = ["rust", "toml"]

[[plugins]]
url = "https://github.com/rachartier/tiny-inline-diagnostic.nvim"

[[plugins]]
url = "https://github.com/chrisgrieser/nvim-lsp-endhints"

[[plugins]]
url = "https://github.com/folke/trouble.nvim"
on_cmd = "Trouble"

[[plugins]]
url = "https://github.com/neovim/nvim-lspconfig"
on_event = ["BufRead", "BufNewFile"]
depends = [
  "krust.nvim",
  "neoconf.nvim",
  "trouble.nvim",
  "lspkind.nvim",
  "mason-lspconfig.nvim",
  "mason.nvim",
  "blink.cmp",
]

[[plugins]]
url = "https://github.com/ThePrimeagen/refactoring.nvim"

# ── completion (blink) ───────────────────────────────

[[plugins]]
url = "https://github.com/saghen/blink.download"
lazy = true

[[plugins]]
url = "https://github.com/mikavilpas/blink-ripgrep.nvim"
lazy = true

[[plugins]]
url = "https://github.com/saghen/blink.compat"
lazy = true
merge = false  # blink.cmp と lua/blink/ 名前空間が衝突するため

[[plugins]]
url = "https://github.com/saghen/blink.cmp"
on_event = ["InsertEnter", "CmdlineEnter"]
depends = ["blink-ripgrep.nvim", "friendly-snippets", "blink.compat"]

# ── snippet (denippet) ───────────────────────────────

[[plugins]]
url = "https://github.com/rafamadriz/friendly-snippets"
lazy = true

[[plugins]]
url = "https://github.com/uga-rosa/denippet.vim"

[[plugins]]
url = "https://github.com/chrisgrieser/nvim-scissors"

# ── treesitter ───────────────────────────────────────

[[plugins]]
url = "https://github.com/nvim-treesitter/nvim-treesitter"
on_event = ["BufRead", "BufNewFile"]
rev = "main"

[[plugins]]
url = "https://github.com/nvim-treesitter/nvim-treesitter-context"
on_event = ["BufRead", "BufNewFile"]
depends = ["nvim-treesitter"]

[[plugins]]
url = "https://github.com/VonHeikemen/ts-enable.nvim"
on_event = ["BufRead", "BufNewFile"]
depends = ["nvim-treesitter"]

# ── ui ───────────────────────────────────────────────

[[plugins]]
url = "https://github.com/lambdalisue/vim-seethrough"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/andymass/vim-matchup"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/mopp/smartnumber.vim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/xiyaowong/virtcolumn.nvim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/RRethy/vim-illuminate"
on_event = ["BufRead", "BufNewFile"]
depends = ["nvim-treesitter"]
cond = "{{ vars.use_illuminate }}"

[[plugins]]
url = "https://github.com/unblevable/quick-scope"
on_event = "CursorHold"
cond = "{{ vars.use_quickscope }}"

[[plugins]]
url = "https://github.com/ntpeters/vim-better-whitespace"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/LumaKernel/nvim-visual-eof.lua"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/DanilaMihailov/beacon.nvim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/gen740/SmoothCursor.nvim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/folke/edgy.nvim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/lewis6991/satellite.nvim"
on_event = ["BufRead", "BufNewFile"]
cond = "{{ vars.use_satellite }}"

[[plugins]]
url = "https://github.com/Aasim-A/scrollEOF.nvim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/luukvbaal/statuscol.nvim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/thinca/vim-zenspace"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/mawkler/hml.nvim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/itchyny/vim-highlighturl"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/Bekaboo/dropbar.nvim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/chrisgrieser/nvim-origami"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/m-demare/hlargs.nvim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/folke/noice.nvim"
depends = ["nui.nvim"]
cond = "{{ vars.use_noice }}"

[[plugins]]
url = "https://github.com/folke/which-key.nvim"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/y3owk1n/undo-glow.nvim"

# ── snacks ───────────────────────────────────────────

[[plugins]]
url = "https://github.com/folke/snacks.nvim"
cond = "{{ vars.use_snacks }}"

# ── edit ─────────────────────────────────────────────

[[plugins]]
url = "https://github.com/monaqa/dial.nvim"
on_map = [
  { lhs = "<c-a>", mode = "n" },
  { lhs = "<c-x>", mode = "n" },
  { lhs = "g<c-a>", mode = "n" },
  { lhs = "g<c-x>", mode = "n" },
]

[[plugins]]
url = "https://github.com/hrsh7th/nvim-insx"
cond = "{{ vars.use_insx }}"

[[plugins]]
url = "https://github.com/Shougo/context_filetype.vim"

[[plugins]]
url = "https://github.com/uga-rosa/contextment.vim"
depends = ["context_filetype.vim"]
on_map = [
  { lhs = "gcc", mode = "n" },
  { lhs = "gcc", mode = "x" },
]

[[plugins]]
url = "https://github.com/gbprod/yanky.nvim"
cond = "{{ vars.use_yanky }}"

[[plugins]]
url = "https://github.com/thinca/vim-qfreplace"
cond = "{{ vars.use_qfreplace }}"

[[plugins]]
url = "https://github.com/ysmb-wtsg/in-and-out.nvim"

[[plugins]]
url = "https://github.com/kana/vim-niceblock"

[[plugins]]
url = "https://github.com/chrisgrieser/nvim-chainsaw"

[[plugins]]
url = "https://github.com/kako-jun/chillout.nvim"

[[plugins]]
url = "https://github.com/kako-jun/chunkundo.nvim"
depends = ["chillout.nvim"]

[[plugins]]
url = "https://github.com/junegunn/vim-easy-align"
on_map = [{ lhs = "<enter>", mode = "v" }]

[[plugins]]
url = "https://github.com/kana/vim-repeat"

# ── motion ───────────────────────────────────────────

[[plugins]]
url = "https://github.com/haya14busa/vim-edgemotion"

[[plugins]]
url = "https://github.com/folke/flash.nvim"
cond = "{{ vars.use_flash }}"

[[plugins]]
url = "https://github.com/yuki-yano/zero.nvim"

[[plugins]]
url = "https://github.com/Bakudankun/BackAndForward.vim"

# ── search ───────────────────────────────────────────

[[plugins]]
url = "https://github.com/haya14busa/vim-asterisk"

[[plugins]]
url = "https://github.com/lambdalisue/vim-kensaku"

[[plugins]]
url = "https://github.com/kevinhwang91/nvim-hlslens"
depends = ["vim-asterisk"]

[[plugins]]
url = "https://github.com/MagicDuck/grug-far.nvim"

# ── git ──────────────────────────────────────────────

[[plugins]]
url = "https://github.com/lewis6991/gitsigns.nvim"
on_event = "BufRead"

[[plugins]]
url = "https://github.com/lambdalisue/vim-askpass"
lazy = true

[[plugins]]
url = "https://github.com/lambdalisue/vim-guise"
lazy = true

[[plugins]]
url = "https://github.com/lambdalisue/vim-gin"

[[plugins]]
url = "https://github.com/rhysd/committia.vim"

[[plugins]]
url = "https://github.com/clabby/difftastic.nvim"
depends = ["nui.nvim"]
cond = "{{ vars.use_difftastic }}"

[[plugins]]
url = "https://github.com/pwntester/octo.nvim"
on_cmd = "Octo"
depends = ["plenary.nvim", "nvim-web-devicons"]

[[plugins]]
url = "https://github.com/akinsho/git-conflict.nvim"
on_event = "BufRead"

[[plugins]]
url = "https://github.com/skanehira/github-actions.nvim"
on_map = [
  { lhs = "<leader>Gd", mode = "n", desc = "Dispatch workflow" },
  { lhs = "<leader>Gh", mode = "n", desc = "Show workflow history" },
  { lhs = "<leader>Gw", mode = "n", desc = "Watch running workflow" },
]

[[plugins]]
url = "https://github.com/dallagi/git-timemachine.nvim"
on_cmd = "GitTimeMachine"

# ── statusline (slimline) ────────────────────────────

[[plugins]]
url = "https://github.com/sschleemilch/slimline.nvim"
cond = "{{ vars.use_slimline }}"

# ── terminal (toggleterm) ────────────────────────────

[[plugins]]
url = "https://github.com/akinsho/toggleterm.nvim"
cond = "{{ vars.use_toggleterm }}"

# ── filer (yazi) ─────────────────────────────────────

[[plugins]]
url = "https://github.com/mikavilpas/yazi.nvim"
depends = ["plenary.nvim"]
cond = "{{ vars.use_yazi }}"

# ── window ───────────────────────────────────────────

[[plugins]]
url = "https://github.com/simeji/winresizer"
on_cmd = "WinResizerStartFocus"

[[plugins]]
url = "https://github.com/tenxsoydev/size-matters.nvim"
cond = "vim.fn.exists('g:neovide') == 1 or vim.fn.exists(':GuiFont') == 2"

[[plugins]]
url = "https://github.com/thinca/vim-winenv"
cond = "vim.fn.has('win32') == 1"

[[plugins]]
url = "https://github.com/4513ECHO/vim-snipewin"
on_map = [{ lhs = "sw", mode = "n" }]
cond = "{{ vars.use_snipewin }}"

[[plugins]]
url = "https://github.com/nvim-zh/colorful-winsep.nvim"
on_event = ["WinNew", "WinEnter"]

[[plugins]]
url = "https://github.com/mrjones2014/smart-splits.nvim"

# ── quickfix ─────────────────────────────────────────

[[plugins]]
url = "https://github.com/kevinhwang91/nvim-bqf"
cond = "{{ vars.use_bqf }}"

[[plugins]]
url = "https://github.com/mei28/qfc.nvim"

[[plugins]]
url = "https://github.com/itchyny/vim-qfedit"

# ── operator ─────────────────────────────────────────

[[plugins]]
url = "https://github.com/kana/vim-operator-user"
lazy = true

[[plugins]]
url = "https://github.com/machakann/vim-sandwich"
depends = ["vim-operator-user"]
on_map = [
  { lhs = "sa", mode = ["n", "x", "o"] },
  { lhs = "sd", mode = "n" },
  { lhs = "sr", mode = "n" },
]

[[plugins]]
url = "https://github.com/kana/vim-operator-replace"
depends = ["vim-operator-user"]
on_map = [{ lhs = "_", mode = ["n", "x"] }]

# ── textobj ──────────────────────────────────────────

[[plugins]]
url = "https://github.com/kana/vim-textobj-user"
lazy = true

[[plugins]]
url = "https://github.com/kana/vim-textobj-entire"
depends = ["vim-textobj-user"]
on_map = [
  { lhs = "ae", mode = ["x", "o"] },
  { lhs = "ie", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/kana/vim-textobj-indent"
depends = ["vim-textobj-user"]
on_map = [
  { lhs = "ai", mode = ["x", "o"] },
  { lhs = "ii", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/kana/vim-textobj-line"
depends = ["vim-textobj-user"]
on_map = [
  { lhs = "al", mode = ["x", "o"] },
  { lhs = "il", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/gilligan/textobj-lastpaste"
depends = ["vim-textobj-user"]
on_map = [
  { lhs = "ay", mode = ["x", "o"] },
  { lhs = "iy", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/machakann/vim-swap"
on_map = [
  { lhs = "g<", mode = ["n", "x"] },
  { lhs = "g>", mode = ["n", "x"] },
  { lhs = "gs", mode = ["n", "x"] },
]

[[plugins]]
url = "https://github.com/machakann/vim-textobj-functioncall"
on_map = [
  { lhs = "af", mode = ["x", "o"] },
  { lhs = "if", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/yuki-yano/vim-textobj-generics"
depends = ["vim-textobj-functioncall"]
on_map = [
  { lhs = "a<", mode = ["x", "o"] },
  { lhs = "i<", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/terryma/vim-expand-region"
on_map = [
  { lhs = "+", mode = "x" },
  { lhs = "-", mode = "x" },
]

# ── ai ───────────────────────────────────────────────

[[plugins]]
url = "https://github.com/lambdalisue/nvim-aibo"
on_map = [
  { lhs = "<space>b", mode = "n", desc = "Aibo gemini" },
  { lhs = "<space>B", mode = "n", desc = "Aibo gemini focus" },
]
cond = "{{ vars.use_ai }}"

[[plugins]]
url = "https://github.com/folke/sidekick.nvim"
cond = "{{ vars.use_ai }}"

[[plugins]]
url = "https://github.com/yukimemi/futago.vim"
on_map = ["mf"]
on_cmd = ["FutagoGitCommit", "FutagoJjCommit", "FutagoHistory"]
cond = "{{ vars.use_ai }}"

# ── memo ─────────────────────────────────────────────

[[plugins]]
url = "https://github.com/glidenote/memolist.vim"

[[plugins]]
url = "https://github.com/walkersumida/fusen.nvim"
on_map = ["ml", "me", "mn", "mp"]
cond = "{{ vars.use_fusen }}"

# ── runner (overseer) ────────────────────────────────

[[plugins]]
url = "https://github.com/stevearc/overseer.nvim"
on_cmd = ["OverseerOpen", "OverseerClose", "OverseerToggle", "OverseerRun", "OverseerShell", "OverseerTaskAction"]
cond = "{{ vars.use_overseer }}"

# ── test (vimtest) ───────────────────────────────────

[[plugins]]
url = "https://github.com/skywind3000/asyncrun.vim"
on_cmd = "AsyncRun"

[[plugins]]
url = "https://github.com/vim-test/vim-test"
depends = ["asyncrun.vim"]
on_cmd = ["TestNearest", "TestFile", "TestSuite", "TestLast", "TestVisit"]

# ── todo ─────────────────────────────────────────────

[[plugins]]
