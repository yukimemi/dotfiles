# rvpm config — https://github.com/yukimemi/rvpm#configuration

[vars]
operator_stay_cursor = false
operator_html_escape = false

[options]

# ── util ────────────────────────────────────────
[[plugins]]
url = "https://github.com/hrsh7th/nvim-dansa"
on_event = ["BufReadPre", "BufNew"]
 
[[plugins]]
url = "https://github.com/manuuurino/autoread.nvim"
on_cmd = ["Autoread"]

[[plugins]]
url = "https://github.com/juliuswaldmann/here.nvim"
on_cmd = ["Here"]

[[plugins]]
url = "https://github.com/MunifTanjim/nui.nvim"
lazy = true

# ── denops ────────────────────────────────────────

[[plugins]]
url = "https://github.com/vim-denops/denops.vim"
merge = false

# ── completion ────────────────────────────────────

[[plugins]]
url = "https://github.com/saghen/blink.cmp"
on_event = "InsertEnter"
depends = ["blink-ripgrep.nvim", "friendly-snippets"]
build = "cargo build --release"

[[plugins]]
url = "https://github.com/mikavilpas/blink-ripgrep.nvim"
lazy = true

# ── snippet (denippet) ───────────────────────────────

[[plugins]]
url = "https://github.com/rafamadriz/friendly-snippets"
lazy = true

[[plugins]]
url = "https://github.com/uga-rosa/denippet.vim"

# ── ui ───────────────────────────────────────────────

[[plugins]]
url = "https://github.com/lambdalisue/vim-seethrough"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/andymass/vim-matchup"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/mopp/smartnumber.vim"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/xiyaowong/virtcolumn.nvim"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/RRethy/vim-illuminate"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/unblevable/quick-scope"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/ntpeters/vim-better-whitespace"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/LumaKernel/nvim-visual-eof.lua"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/DanilaMihailov/beacon.nvim"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/gen740/SmoothCursor.nvim"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/itchyny/vim-highlighturl"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/chrisgrieser/nvim-origami"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/folke/noice.nvim"
depends = ["nui.nvim"]

[[plugins]]
url = "https://github.com/folke/which-key.nvim"
on_event = "CursorHold"

[[plugins]]
url = "https://github.com/y3owk1n/undo-glow.nvim"

# ── snacks ───────────────────────────────────────────

[[plugins]]
url = "https://github.com/folke/snacks.nvim"

# ── edit ─────────────────────────────────────────────

[[plugins]]
url = "https://github.com/monaqa/dial.nvim"
on_map = [
  { lhs = "<c-a>", mode = "n" },
  { lhs = "<c-x>", mode = "n" },
  { lhs = "g<c-a>", mode = "n" },
  { lhs = "g<c-x>", mode = "n" },
]

[[plugins]]
url = "https://github.com/hrsh7th/nvim-insx"

[[plugins]]
url = "https://github.com/Shougo/context_filetype.vim"

[[plugins]]
url = "https://github.com/uga-rosa/contextment.vim"
depends = ["context_filetype.vim"]
on_map = [
  { lhs = "gcc", mode = "n" },
  { lhs = "gcc", mode = "x" },
]

[[plugins]]
url = "https://github.com/gbprod/yanky.nvim"

[[plugins]]
url = "https://github.com/junegunn/vim-easy-align"
on_map = [{ lhs = "<enter>", mode = "v" }]

[[plugins]]
url = "https://github.com/kana/vim-repeat"

# ── motion ───────────────────────────────────────────

[[plugins]]
url = "https://github.com/haya14busa/vim-edgemotion"

[[plugins]]
url = "https://github.com/folke/flash.nvim"

[[plugins]]
url = "https://github.com/yuki-yano/zero.nvim"

[[plugins]]
url = "https://github.com/Bakudankun/BackAndForward.vim"

# ── search ───────────────────────────────────────────

[[plugins]]
url = "https://github.com/haya14busa/vim-asterisk"

[[plugins]]
url = "https://github.com/lambdalisue/vim-kensaku"

[[plugins]]
url = "https://github.com/kevinhwang91/nvim-hlslens"
depends = ["vim-asterisk"]

[[plugins]]
url = "https://github.com/MagicDuck/grug-far.nvim"

# ── git ──────────────────────────────────────────────

[[plugins]]
url = "https://github.com/lewis6991/gitsigns.nvim"
on_event = "BufRead"

[[plugins]]
url = "https://github.com/lambdalisue/vim-askpass"
lazy = true

[[plugins]]
url = "https://github.com/lambdalisue/vim-guise"
lazy = true

[[plugins]]
url = "https://github.com/lambdalisue/vim-gin"

[[plugins]]
url = "https://github.com/rhysd/committia.vim"

[[plugins]]
url = "https://github.com/dallagi/git-timemachine.nvim"
on_cmd = "GitTimeMachine"


# ── terminal (toggleterm) ────────────────────────────

[[plugins]]
url = "https://github.com/akinsho/toggleterm.nvim"

# ── filer (yazi) ─────────────────────────────────────

[[plugins]]
url = "https://github.com/mikavilpas/yazi.nvim"

# ── window ───────────────────────────────────────────

[[plugins]]
url = "https://github.com/simeji/winresizer"
on_cmd = "WinResizerStartFocus"

[[plugins]]
url = "https://github.com/tenxsoydev/size-matters.nvim"
cond = "vim.fn.exists('g:neovide') == 1 or vim.fn.exists(':GuiFont') == 2"

[[plugins]]
url = "https://github.com/4513ECHO/vim-snipewin"
on_map = [{ lhs = "sw", mode = "n" }]

[[plugins]]
url = "https://github.com/nvim-zh/colorful-winsep.nvim"
on_event = ["WinNew", "WinEnter"]

[[plugins]]
url = "https://github.com/mrjones2014/smart-splits.nvim"

# ── quickfix ─────────────────────────────────────────

[[plugins]]
url = "https://github.com/kevinhwang91/nvim-bqf"

[[plugins]]
url = "https://github.com/mei28/qfc.nvim"

[[plugins]]
url = "https://github.com/itchyny/vim-qfedit"

# ── operator ─────────────────────────────────────────

[[plugins]]
url = "https://github.com/kana/vim-operator-user"
lazy = true

[[plugins]]
url = "https://github.com/machakann/vim-sandwich"
depends = ["vim-operator-user"]
on_map = [
  { lhs = "sa", mode = ["n", "x", "o"] },
  { lhs = "sd", mode = "n" },
  { lhs = "sr", mode = "n" },
]

[[plugins]]
url = "https://github.com/kana/vim-operator-replace"
depends = ["vim-operator-user"]
on_map = [{ lhs = "_", mode = ["n", "x"] }]

# ── textobj ──────────────────────────────────────────

[[plugins]]
url = "https://github.com/kana/vim-textobj-user"
lazy = true

[[plugins]]
url = "https://github.com/kana/vim-textobj-entire"
depends = ["vim-textobj-user"]
on_map = [
  { lhs = "ae", mode = ["x", "o"] },
  { lhs = "ie", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/kana/vim-textobj-indent"
depends = ["vim-textobj-user"]
on_map = [
  { lhs = "ai", mode = ["x", "o"] },
  { lhs = "ii", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/kana/vim-textobj-line"
depends = ["vim-textobj-user"]
on_map = [
  { lhs = "al", mode = ["x", "o"] },
  { lhs = "il", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/gilligan/textobj-lastpaste"
depends = ["vim-textobj-user"]
on_map = [
  { lhs = "ay", mode = ["x", "o"] },
  { lhs = "iy", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/machakann/vim-swap"
on_map = [
  { lhs = "g<", mode = ["n", "x"] },
  { lhs = "g>", mode = ["n", "x"] },
  { lhs = "gs", mode = ["n", "x"] },
]

[[plugins]]
url = "https://github.com/machakann/vim-textobj-functioncall"
on_map = [
  { lhs = "af", mode = ["x", "o"] },
  { lhs = "if", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/yuki-yano/vim-textobj-generics"
depends = ["vim-textobj-functioncall"]
on_map = [
  { lhs = "a<", mode = ["x", "o"] },
  { lhs = "i<", mode = ["x", "o"] },
]

[[plugins]]
url = "https://github.com/terryma/vim-expand-region"
on_map = [
  { lhs = "+", mode = "x" },
  { lhs = "-", mode = "x" },
]

# ── ai ───────────────────────────────────────────────

[[plugins]]
url = "https://github.com/lambdalisue/nvim-aibo"
on_map = [
  { lhs = "<space>b", mode = "n", desc = "Aibo gemini" },
  { lhs = "<space>B", mode = "n", desc = "Aibo gemini focus" },
]

[[plugins]]
url = "https://github.com/yukimemi/futago.vim"
on_map = ["mf"]
on_cmd = ["FutagoGitCommit", "FutagoJjCommit", "FutagoHistory"]

# ── memo ─────────────────────────────────────────────

[[plugins]]
url = "https://github.com/glidenote/memolist.vim"

# ── runner (overseer) ────────────────────────────────

[[plugins]]
url = "https://github.com/stevearc/overseer.nvim"
on_cmd = ["OverseerOpen", "OverseerClose", "OverseerToggle", "OverseerRun", "OverseerShell", "OverseerTaskAction"]

# ── test (vimtest) ───────────────────────────────────

[[plugins]]
url = "https://github.com/skywind3000/asyncrun.vim"
on_cmd = "AsyncRun"

[[plugins]]
url = "https://github.com/vim-test/vim-test"
depends = ["asyncrun.vim"]
on_cmd = ["TestNearest", "TestFile", "TestSuite", "TestLast", "TestVisit"]

# ── todo ─────────────────────────────────────────────

[[plugins]]
url = "https://github.com/arnarg/todotxt.nvim"

# ── startup ──────────────────────────────────────────

[[plugins]]
url = "https://github.com/dstein64/vim-startuptime"
