# rvpm config — https://github.com/yukimemi/rvpm#configuration

[vars]
# features
use_ai = true
use_treesitter = true
use_lsp = true
use_git = true
use_mini = false
use_twitter = false
# selections
use_blink = true
use_snacks = true
use_yazi = true
use_slimline = true
use_denippet = true
use_overseer = true
use_flash = true
use_noice = true
use_quickscope = true
use_toggleterm = true
use_satellite = true
use_insx = true
use_dansa = true
use_snapshot = true
# individual
use_illuminate = true
use_yanky = true
use_difftastic = true
use_denops_translate = true
use_fusen = true
use_bqf = true
use_qfreplace = true
use_snipewin = true

[options]

# ── libs ─────────────────────────────────────────────

[[plugins]]
url = "https://github.com/vim-denops/denops.vim"
merge = false

[[plugins]]
url = "https://github.com/thinca/vim-localrc"

[[plugins]]
url = "https://github.com/tani/vim-artemis"

[[plugins]]
url = "https://github.com/nvim-lua/plenary.nvim"
lazy = true

[[plugins]]
url = "https://github.com/MunifTanjim/nui.nvim"
lazy = true

[[plugins]]
url = "https://github.com/kamalsacranie/nvim-mapper"

[[plugins]]
url = "https://github.com/tyru/open-browser.vim"

[[plugins]]
url = "https://github.com/tyru/open-browser-github.vim"
depends = ["open-browser.vim"]

[[plugins]]
url = "https://github.com/lambdalisue/vim-readablefold"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/hrsh7th/nvim-dansa"
on_event = ["BufRead", "BufNewFile"]
cond = "{{ vars.use_dansa }}"

[[plugins]]
url = "https://github.com/kevinhwang91/promise-async"
merge = false

[[plugins]]
url = "https://github.com/nvim-tree/nvim-web-devicons"
lazy = true

# ── denops ───────────────────────────────────────────

[[plugins]]
url = "https://github.com/yukimemi/autocursor.vim"

[[plugins]]
url = "https://github.com/yukimemi/silentsaver.vim"

[[plugins]]
url = "https://github.com/yukimemi/asyncsearcher.vim"

[[plugins]]
url = "https://github.com/yukimemi/chronicle.vim"

[[plugins]]
url = "https://github.com/yukimemi/autoreplacer.vim"

[[plugins]]
url = "https://github.com/yukimemi/asyncwalker.vim"

[[plugins]]
url = "https://github.com/yukimemi/hitori.vim"

[[plugins]]
url = "https://github.com/yukimemi/ahdr.vim"

# ── util ─────────────────────────────────────────────

[[plugins]]
url = "https://github.com/thinca/vim-partedit"

[[plugins]]
url = "https://github.com/uga-rosa/ccc.nvim"
on_cmd = ["CccPick", "CccConvert", "CccHighlighterToggle"]

[[plugins]]
