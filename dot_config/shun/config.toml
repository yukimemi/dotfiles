auto_start = true
sort_order = "recent_first"
search_mode = "fuzzy_migemo"
hide_on_blur = true
window_width = 700
max_items = 10
max_completions = 8
opacity = 0.9
icon_style = "svg"
preview_args = true
preview_search = true

[vars]
memo_path = "~/.memolist"
junk_path = "~/.cache/junkfile"
src_path = "~/src"

[log]
level = "debug"

[keybindings]
launch = "Ctrl+Enter"
next = "Ctrl+n"
prev = "Ctrl+p"
confirm = "Enter"
arg_mode = "Tab"
accept_word = "Ctrl+f"
accept_line = "Ctrl+e"
delete_word = "Ctrl+w"
delete_line = "Ctrl+u"
close = "Escape"

[theme]
preset = "tokyo-night"

[[apps]]
name = "Neovide"
path = "neovide"
completion = "path"

[[apps]]
name = "Todo"
path = "hitori.cmd"
args = ["{{ vars.memo_path }}/todo.md"]

[[apps]]
name = "Open Project"
path = "neovide"
args = ["{{ vars.src_path }}/{{ args }}"]
completion = "path"

[[apps]]
name = "MemoNew"
path = "nvim"
args = [
  '{{ vars.memo_path }}/{{ now() | date(format="%Y-%m-%d") }}-{{ args }}.md',
]
completion = "none"

[[apps]]
name = "MemoList"
path = "nvim"
args = ["{{ vars.memo_path }}/{{ args }}"]
completion = "path"
completion_search_mode = "migemo"

[[apps]]
name = "JunkNew"
path = "nvim-qt"
args = [
  '{{ vars.junk_path }}/{{ now() | date(format="%Y") }}/{{ now() | date(format="%m") }}/{{ now() | date(format="%Y-%m-%d") }}-{{ now() | date(format="%H%M%S") }}.{{ args }}',
]
completion = "none"

[[apps]]
name = "Scoop"
path = "scoop"
completion = "list"
completion_list = [
  "install",
  "uninstall",
  "update",
  "search",
  "list",
  "info",
  "status",
  "cleanup",
  "bucket",
  "cache",
  "checkup",
  "config",
  "hold",
  "unhold",
  "reset",
  "shim",
  "which",
]

[[apps]]
name = "Git"
path = "git"
completion = "command"
completion_command = "git branch --format='%(refname:short)'"
workdir = "{{ vars.src_path }}/github.com/yukimemi/shun"

[[apps]]
name = "ccusage"
path = "https://claude.ai/settings/usage"

[[apps]]
name = "Google"
path = "https://www.google.com/search?q={{ args | urlencode }}"

[[apps]]
name = "GitHub Search"
path = "https://github.com/search?q={{ args | urlencode }}"

[[apps]]
name = "Perplexity"
path = "https://www.perplexity.ai/search?q={{ args | urlencode }}"

[[apps]]
name = "Amazon"
path = "https://www.amazon.co.jp/s?k={{ args | urlencode }}&sort=salesrank&s=review-rank"

[[apps]]
name = "YouTube"
path = "https://www.youtube.com/results?search_query={{ args | urlencode }}"

[[apps]]
name = "Zenn"
path = "https://zenn.dev/search?q={{ args | urlencode }}"

[[apps]]
name = "Qiita"
path = "https://qiita.com/search?q={{ args | urlencode }}"

[[apps]]
name = "Stack Overflow"
path = "https://stackoverflow.com/search?q={{ args | urlencode }}"

[[apps]]
name = "crates.io"
path = "https://crates.io/search?q={{ args | urlencode }}"

[[apps]]
name = "npm"
path = "https://www.npmjs.com/search?q={{ args | urlencode }}"

[[apps]]
name = "JSR"
path = "https://jsr.io/?search={{ args | urlencode }}"

[[apps]]
name = "DeepL ja->en"
path = "https://www.deepl.com/translator#ja/en/{{ args | urlencode }}"

[[apps]]
name = "DeepL en->ja"
path = "https://www.deepl.com/translator#en/ja/{{ args | urlencode }}"

[[apps]]
name = "Wikipedia"
path = "https://ja.wikipedia.org/wiki/Special:Search?search={{ args | urlencode }}"

[[apps]]
name = "Docker Hub"
path = "https://hub.docker.com/search?q={{ args | urlencode }}"

[[apps]]
name = "X"
path = "https://x.com/search?q={{ args | urlencode }}"

[[scan_dirs]]
path = "{{ vars.src_path }}/github.com/yukimemi/ps1/src"
recursive = false
extensions = ["ps1"]

[[scan_dirs]]
path = "~/.local/share/chezmoi/win/scripts"
recursive = false
extensions = ["ps1"]

[[scan_dirs]]
path = "C:/Windows/System32"
recursive = false
extensions = ["exe"]
