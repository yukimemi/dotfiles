# 履歴のソート順: "count_first" (回数＞直近＞名前) / "recent_first" (直近＞回数＞名前)
sort_order = "recent_first"
# 検索モード: "fuzzy" (ファジー検索) / "exact" (部分一致)
search_mode = "fuzzy"
hide_on_blur = false
window_width = 700
max_items = 10
max_completions = 8

[keybindings]
launch = "Ctrl+Enter"
next = "Ctrl+n"
prev = "Ctrl+p"
confirm = "Enter"
arg_mode = "Tab"
accept_word = "Ctrl+f"
accept_line = "Ctrl+e"
delete_word = "Ctrl+w"
delete_line = "Ctrl+u"
close = "Escape"

# アプリ・スクリプトの個別登録
[[apps]]
name = "Neovide"
path = "neovide"
completion = "path"

[[apps]]
name = "Open Project"
path = "neovide"
args = ["{{ env.USERPROFILE }}/src/{{ args }}"]
completion = "path"

[[apps]]
name = "Scoop"
path = "scoop"
completion = "list"
completion_list = [
  "install",
  "uninstall",
  "update",
  "search",
  "list",
  "info",
  "status",
  "cleanup",
  "bucket",
  "cache",
  "checkup",
  "config",
  "hold",
  "unhold",
  "reset",
  "shim",
  "which",
]

[[apps]]
name = "Git"
path = "git"
completion = "command"
completion_command = "git branch --format='%(refname:short)'"
workdir = "~/src/github.com/yukimemi/shun"

[[apps]]
name = "Google"
path = "https://www.google.com/search?q={{ args | urlencode }}"

[[apps]]
name = "GitHub Search"
path = "https://github.com/search?q={{ args | urlencode }}"

[[apps]]
name = "Perplexity"
path = "https://www.perplexity.ai/search?q={{ args | urlencode }}"

[[apps]]
name = "Phind"
path = "https://www.phind.com/search?q={{ args | urlencode }}"

[[scan_dirs]]
path = "~/src/github.com/yukimemi/ps1/cmd"
recursive = false
extensions = ["cmd"]

[[scan_dirs]]
path = "~/.local/share/chezmoi/win/scripts"
recursive = false
extensions = ["ps1"]

[[scan_dirs]]
path = "C:/Windows/System32"
recursive = false
extensions = ["exe"]
