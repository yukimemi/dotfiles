# yui config — see https://github.com/yukimemi/yui

[vars]
# Migration toggles:
#   - home_root: where the parent mount + parameterized .yuilink dsts
#                land. Set to "~" once the trial passes.
#   - production: when false, OS-extras (`%APPDATA%/<app>` etc.) are
#                 skipped so a test apply doesn't clobber real app data.
home_root = "~"
production = true

[vars.autohotkey]
purpose = "home"
use_new_outlook = true
use_excel = false
use_neovide = true
use_neovim_qt = false
use_wez = false
use_nu = false
use_wtp = true
use_comet = false
use_chrome = false

[[mount.entry]]
src = "home"
dst = "{{ vars.home_root }}"

# --- hooks ---

[[hook]]
name = "mac-init"
script = ".yui/bin/mac-init.sh"
when_run = "once"
phase = "pre"
when = "yui.os == 'macos'"

[[hook]]
name = "brew-bundle"
script = ".yui/bin/brew-bundle.sh"
when_run = "every"
phase = "post"
when = "yui.os == 'macos'"

[[hook]]
name = "setup-wsl"
script = ".yui/bin/setup-wsl.sh"
when_run = "onchange"
phase = "post"
when = "yui.os == 'linux'"

[[hook]]
name = "setup-openclaw"
script = ".yui/bin/setup-openclaw.sh"
when_run = "onchange"
phase = "post"
when = "yui.os == 'linux'"

[[hook]]
name = "enable-openclaw"
script = ".yui/bin/enable-openclaw.sh"
when_run = "onchange"
phase = "post"
when = "yui.os == 'linux'"

[[hook]]
name = "windows-setup"
script = ".yui/bin/windows-setup.ps1"
command = "pwsh"
args = ["-NoProfile", "-File", "{{ script_path }}"]
when_run = "onchange"
phase = "post"
when = "yui.os == 'windows' and vars.production"

