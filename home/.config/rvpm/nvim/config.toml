  { lhs = "g<", mode = [
    "n",
    "x",
  ] },
  { lhs = "g>", mode = [
    "n",
    "x",
  ] },
  { lhs = "gs", mode = [
    "n",
    "x",
  ] },
]

[[plugins]]
