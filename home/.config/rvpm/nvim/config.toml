# rvpm config — https://github.com/yukimemi/rvpm#configuration

[vars]

[options]
auto_clean = true
url_style = "full"
concurrency = 16
ai = "claude"
ai_language = "ja"

# ── core ────────────────────────────────────────
[[plugins]]
url = "https://github.com/yukimemi/rvpm.nvim"

[[plugins]]
url = "https://github.com/nvim-lua/plenary.nvim"
lazy = true

[[plugins]]
url = "https://github.com/MunifTanjim/nui.nvim"
lazy = true

[[plugins]]
url = "https://github.com/hrsh7th/nvim-dansa"
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/manuuurino/autoread.nvim"
on_cmd = ["Autoread"]

[[plugins]]
url = "https://github.com/juliuswaldmann/here.nvim"
on_cmd = ["/^.*Here$/"]

[[plugins]]
url = "https://github.com/thinca/vim-ambicmd"
on_event = ["CmdlineEnter", "CmdwinEnter"]

[[plugins]]
url = "https://github.com/yukimemi/hitori.vim"
cond = "false"

[[plugins]]
url = "https://github.com/kana/vim-repeat"

[[plugins]]
url = "https://github.com/dstein64/vim-startuptime"
on_cmd = "StartupTime"

# ── session ─────────────────────────────────────
[[plugins]]
url = "https://github.com/rmagatti/auto-session"
cond = "false"

[[plugins]]
url = "https://github.com/DrKJeff16/project.nvim"
depends = ["snacks.nvim"]

# ── denops ──────────────────────────────────────

[[plugins]]
url = "https://github.com/vim-denops/denops.vim"
merge = false

[[plugins]]
url = "https://github.com/yukimemi/chronicle.vim"
depends = ["denops.vim"]

[[plugins]]
url = "https://github.com/yukimemi/snacks-source-chronicle"
depends = ["snacks.nvim", "chronicle.vim"]
on_map = [
  { lhs = "mr", mode = "n", desc = "Chronicle Read" },
  { lhs = "mw", mode = "n", desc = "Chronicle Write" },
]

[[plugins]]
url = "https://github.com/yukimemi/asyncsearcher.vim"
depends = ["denops.vim"]
on_cmd = ["AsyncSearch"]

[[plugins]]
url = "https://github.com/yukimemi/silentsaver.vim"
depends = ["denops.vim"]

[[plugins]]
url = "https://github.com/yukimemi/autoreplacer.vim"
depends = ["denops.vim"]
on_event = ["BufRead", "BufNewFile"]

[[plugins]]
url = "https://github.com/yukimemi/ahdr.vim"
depends = ["denops.vim"]
on_cmd = ["DenopsAhdr"]

# ── snacks ──────────────────────────────────────

[[plugins]]
url = "https://github.com/folke/snacks.nvim"

