on_event = "CursorHold"

# ── lsp ───────────────────────────────────────────
[[plugins]]
url = "https://github.com/neovim/nvim-lspconfig"
depends = ["blink.cmp"]
on_event = "BufReadPre"

[[plugins]]
url = "https://github.com/mason-org/mason.nvim"
on_cmd = "Mason"

[[plugins]]
url = "https://github.com/mason-org/mason-lspconfig.nvim"
depends = ["mason.nvim", "nvim-lspconfig"]
on_source = ["nvim-lspconfig"]

[[plugins]]
url = "https://github.com/stevearc/conform.nvim"
on_event = "BufReadPre"

[[plugins]]
url = "https://github.com/lewis6991/hover.nvim"
on_map = [
  { lhs = "K", desc = "hover.nvim (open)" },
  { lhs = "gK", desc = "hover.nvim (enter)" },
  { lhs = "<C-p>", desc = "hover.nvim (previous source)" },
  { lhs = "<C-n>", desc = "hover.nvim (next source)" },
]

[[plugins]]
url = "https://github.com/mfussenegger/nvim-lint"
on_event = ["BufReadPre", "BufNewFile"]

[[plugins]]
url = "https://github.com/nvimdev/lspsaga.nvim"
depends = ["nvim-lspconfig"]
on_cmd = ["/^Lspsaga/"]
on_map = [
  { lhs = "<space>k", mode = "n", desc = "Lspsaga hover_doc" },
  { lhs = "<space>ca", mode = [
    "n",
    "x",
  ], desc = "Lspsaga code_action" },
  { lhs = "<space>rn", mode = "n", desc = "Lspsaga rename" },
  { lhs = "<space>o", mode = "n", desc = "Lspsaga outline" },
  { lhs = "<space>dl", mode = "n", desc = "Lspsaga line diagnostics" },
  { lhs = "<space>dc", mode = "n", desc = "Lspsaga cursor diagnostics" },
  { lhs = "<space>db", mode = "n", desc = "Lspsaga buf diagnostics" },
  { lhs = "]d", mode = "n", desc = "Lspsaga diagnostic next" },
  { lhs = "[d", mode = "n", desc = "Lspsaga diagnostic prev" },
]

[[plugins]]
url = "https://github.com/stevearc/aerial.nvim"
on_cmd = ["AerialToggle"]
on_map = [{ lhs = "<space>a", desc = "AerialToggle" }]

[[plugins]]
url = "https://github.com/j-hui/fidget.nvim"

[[plugins]]
url = "https://github.com/folke/trouble.nvim"
on_cmd = ["Trouble"]
on_map = [
  { lhs = "<leader>xx", desc = "Diagnostics (Trouble)" },
  { lhs = "<leader>xX", desc = "Buffer Diagnostics (Trouble)" },
  { lhs = "<leader>cs", desc = "Symbols (Trouble)" },
  { lhs = "<leader>cl", desc = "LSP (Trouble)" },
  { lhs = "<leader>xL", desc = "Location List (Trouble)" },
  { lhs = "<leader>xQ", desc = "Quickfix List (Trouble)" },
]

[[plugins]]
url = "https://github.com/rachartier/tiny-inline-diagnostic.nvim"
on_cmd = ["TinyInlineDiag"]

[[plugins]]
url = "https://github.com/takeshid/whyis.nvim"
on_cmd = ["WhyisOpen"]
on_map = [
  { lhs = "<leader>wf", desc = "Whyis (float)" },
  { lhs = "<leader>wl", desc = "Whyis (right)" },
]
on_source = ["hover.nvim"]

# ── completion ──────────────────────────────────

[[plugins]]
url = "https://github.com/saghen/blink.lib"
lazy = true

[[plugins]]
url = "https://github.com/saghen/blink.cmp"
on_event = "InsertEnter"
