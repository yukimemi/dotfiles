# ── edit ────────────────────────────────────────

[[plugins]]
url = "https://github.com/monaqa/dial.nvim"
on_map = [
  { lhs = "<c-a>", mode = "n" },
  { lhs = "<c-x>", mode = "n" },
  { lhs = "g<c-a>", mode = "n" },
  { lhs = "g<c-x>", mode = "n" },
]

[[plugins]]
url = "https://github.com/hrsh7th/nvim-insx"
on_event = ["InsertEnter"]

[[plugins]]
url = "https://github.com/Shougo/context_filetype.vim"

[[plugins]]
url = "https://github.com/uga-rosa/contextment.vim"
depends = ["context_filetype.vim"]
on_map = [{ lhs = "gcc", mode = "n" }, { lhs = "gcc", mode = "x" }]

[[plugins]]
url = "https://github.com/gbprod/yanky.nvim"
on_cmd = ["YankyRingHistory", "YankyClearHistory"]
on_map = [
  { lhs = "y", mode = [
    "n",
    "x",
  ] },
  { lhs = "p", mode = [
    "n",
    "x",
  ] },
  { lhs = "P", mode = [
    "n",
    "x",
  ] },
  { lhs = "gp", mode = [
    "n",
    "x",
  ] },
  { lhs = "gP", mode = [
    "n",
    "x",
  ] },
  { lhs = "<c-p>", mode = "n" },
  { lhs = "<c-n>", mode = "n" },
  { lhs = "iy", mode = [
    "o",
    "x",
  ] },
  { lhs = "<leader>p", mode = [
    "n",
    "x",
  ], desc = "Yank History" },
]

[[plugins]]
url = "https://github.com/junegunn/vim-easy-align"
on_map = [{ lhs = "<enter>", mode = "v" }]

# ── operator ────────────────────────────────────

[[plugins]]
