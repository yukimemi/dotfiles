# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
linemode = "size_and_mtime"

[opener]
extract = [
  { run = 'ya pub augmented-extract --list %*', desc = "Extract here" },
]
edit = [
  { run = '${EDITOR:-todoke} "$@"', desc = "$EDITOR", block = true, for = "unix" },
  { run = 'todoke %*', orphan = true, block = false, desc = "edit", for = "windows" },
]
diff = [
  { run = '%USERPROFILE%\scoop\apps\winmerge\current\WinMergeU.exe %*', orphan = true, block = false, desc = "WinMerge", for = "windows" },
]
backup = [
  { run = '%USERPROFILE%\src\github.com\yukimemi\bat\backup-old.bat %*', orphan = true, block = false, desc = "Backup", for = "windows" },
]

[open]
prepend_rules = [
  { url = "*/", use = [
    "reveal",
    "open",
    "edit",
    "diff",
  ] },
  { mime = "*", use = [
    "open",
    "reveal",
    "edit",
    "backup",
    "diff",
  ] },
  { url = "*", use = [
    "open",
    "reveal",
    "edit",
    "backup",
    "diff",
  ] },
]

[plugin]
prepend_preloaders = [{ mime = "application/pdf", run = "noop" }]
prepend_previewers = [
  { url = "*.md", run = "mdcat" },
  { url = "*.zip", run = "ouch" },
  { mime = "application/pdf", run = "noop" },
]
